<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quoridor Web</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <button id="btn-exit-game" class="btn-exit hidden">Exit</button>
    <div class="container">
        <header>
            <h1>Quoridor</h1>
            <div id="turn-indicator" class="turn-indicator">
                <span id="turn-text">Player 1's Turn</span>
                <div class="orientation-toggle">
                    Drag the horizontal or vertical wall onto the board.
                </div>
            </div>
        </header>

        <div class="game-area">
            <!-- P2 at the top / left -->
            <div id="player2-status" class="player-status p2-status">
                <div class="player-info">
                    <div class="player-name">Player 2</div>
                    <div class="walls-left">Walls left: <span id="p2-walls">10</span></div>
                </div>
                <div id="p2-wall-bank" class="wall-bank"></div>
            </div>

            <main class="board-container">
                <div id="board" class="board"></div>
            </main>

            <!-- P1 at the bottom / right -->
            <div id="player1-status" class="player-status p1-status active">
                <div class="player-info">
                    <div class="player-name">Player 1</div>
                    <div class="walls-left">Walls left: <span id="p1-walls">10</span></div>
                </div>
                <div id="p1-wall-bank" class="wall-bank"></div>
            </div>
        </div>
    </div>

    <div id="main-menu" class="overlay">
        <div class="modal main-menu-modal">
            <h2>Select Mode</h2>
            <div class="menu-buttons">
                <button id="btn-play-ai" class="menu-btn">Play vs AI</button>
                <button id="btn-create-room" class="menu-btn">Create Online Room</button>
            </div>
            <div class="join-room-section">
                <input type="text" id="room-code-input" placeholder="Enter Room Code" autocomplete="off" />
                <button id="btn-join-room" class="menu-btn secondary">Join Room</button>
            </div>
            <div id="connection-status" class="status-message"></div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over" class="overlay hidden">
        <div class="modal">
            <h2 id="winner-text">Player 1 Wins!</h2>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <!-- Lobby Screen Overlay -->
    <div id="lobby-screen" class="overlay hidden">
        <div class="modal lobby-modal">
            <h2>Room Lobby</h2>
            <h1 id="lobby-room-code" style="color: var(--p1-color); font-size: clamp(3rem, 10vw, 4.5rem); letter-spacing: 12px; margin: 20px 0; font-family: 'Courier New', Consolas, monospace;">ABCD</h1>
            <p id="lobby-status" style="font-size: 1.2rem; margin-bottom: 25px; color: #ccc;">Waiting for opponent to join...</p>
            <div id="lobby-loader" class="spinner"></div>
            <button id="btn-leave-lobby" class="menu-btn secondary" style="margin-top: 30px;">Cancel</button>
        </div>
    </div>

    <!-- Disconnect Modal Overlay -->
    <div id="disconnect-modal" class="overlay hidden">
        <div class="modal">
            <h2 style="color: #ff3333; margin-bottom: 15px;">Opponent Disconnected</h2>
            <p style="font-size: 1.1rem; color: #ccc;">The other player has left the match.</p>
            <button id="btn-disconnect-ok" class="menu-btn secondary" style="margin-top: 25px;">Return to Menu</button>
        </div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Game Scripts -->
    <script src="online.js"></script>
    <script src="ai.js"></script>
    <script src="script.js"></script>
</body>
</html>
